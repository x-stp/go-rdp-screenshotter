# golangci-lint v2 config for rdp-screenshotter-go.
#
# The default linter set (errcheck, govet, ineffassign, staticcheck, unused)
# is kept on. The tuning below documents two deliberate policy calls:
#
#  1. errcheck: a fixed list of stdlib/cleanup calls whose error return is a
#     genuine no-op in this codebase are excluded, rather than sprinkling
#     `_ = err` at every call site. Everything else must be handled.
#  2. staticcheck: the QF* "quickfix" refactor hints are opt-in and one of
#     them (QF1001, De Morgan) would invert the branch structure of the RLE
#     decoders, which are ported one-to-one from the [MS-RDPBCGR] §3.1.9
#     reference and kept auditable against it. Disabled on purpose.
version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        # Writes to an in-memory *bytes.Buffer never fail (documented).
        - encoding/binary.Write
        - (*bytes.Buffer).Write
        - (*bytes.Buffer).WriteByte
        - (*bytes.Buffer).WriteString
        # Reads/seeks off a *bytes.Reader are all length-guarded at the call
        # site before the read; the error cannot fire.
        - encoding/binary.Read
        - (*bytes.Reader).Read
        - (*bytes.Reader).Seek
        # WriteTo targets are always *bytes.Buffer here (see sendPDU); the
        # actual socket write in sendPDU/conn.Write is checked.
        - (*github.com/x-stp/rdp-screenshotter-go/pkg/rdp.TPKTHeader).WriteTo
        - (*github.com/x-stp/rdp-screenshotter-go/pkg/rdp.X224ConnectionRequest).WriteTo
        # Close on a conn/file we are done with, and read-deadline sets whose
        # only failure mode (closed conn) is surfaced by the following Read.
        - (net.Conn).Close
        - (net.Conn).SetReadDeadline
        - (*os.File).Close
        - (*github.com/x-stp/rdp-screenshotter-go/pkg/rdp.Client).Close
    staticcheck:
      checks:
        - all
        - -QF1001 # De Morgan: keep RLE decoder structure matching the spec/reference
        - -ST1003 # ALL_CAPS names are intentional: they mirror [MS-RDPBCGR]/[MS-RDPELE] wire identifiers verbatim so the code is auditable against the spec
